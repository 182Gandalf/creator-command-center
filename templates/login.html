<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to FlowCast - Access your content scheduler dashboard.">
    <title>Log In - FlowCast</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6; --primary-light: #60a5fa; --secondary: #8b5cf6;
            --bg: #0a0e17; --bg-card: #111827; --bg-hover: #1f2937;
            --text: #f8fafc; --text-muted: #94a3b8; --border: #1f2937;
            --success: #10b981; --error: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; line-height: 1.6;
        }
        .header {
            background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 1.25rem 2.5rem;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        .header-content {
            max-width: 1400px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.875rem; text-decoration: none; }
        .logo-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo-text {
            font-size: 1.75rem; font-weight: 800;
            background: linear-gradient(90deg, #a5f3fc 0%, #60a5fa 50%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        main { padding-top: 100px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 420px; padding: 2rem; }
        .auth-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; font-size: 0.875rem; font-weight: 500;
            margin-bottom: 0.5rem; color: var(--text-muted);
        }
        .form-group input {
            width: 100%; padding: 0.875rem 1rem; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); border-radius: 10px; color: var(--text);
            font-size: 1rem; transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group input::placeholder { color: var(--text-muted); }
        .btn {
            width: 100%; padding: 1rem; border-radius: 10px; font-weight: 600;
            font-size: 1rem; cursor: pointer; border: none; transition: all 0.3s ease;
            text-decoration: none; display: inline-flex; align-items: center;
            justify-content: center; gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); }
        .auth-footer {
            text-align: center; margin-top: 1.5rem;
            color: var(--text-muted); font-size: 0.875rem;
        }
        .auth-footer a { color: var(--primary-light); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0; color: var(--text-muted); font-size: 0.875rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .social-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text); margin-bottom: 0.75rem;
        }
        .social-btn:hover { background: var(--bg-hover); border-color: var(--primary); }
        .forgot-password {
            text-align: right; margin-top: -1rem; margin-bottom: 1.5rem;
        }
        .forgot-password a {
            font-size: 0.875rem; color: var(--primary-light); text-decoration: none;
        }
        .forgot-password a:hover { text-decoration: underline; }
        @media (max-width: 640px) {
            .header { padding: 1rem; }
            .logo-text { font-size: 1.5rem; }
            .auth-container { padding: 1rem; }
            .auth-box { padding: 1.5rem; }
            .auth-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon"><img src="/static/logo-new.jpg" alt="FlowCast" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;"></div>
                <span class="logo-text">FlowCast</span>
            </a>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <h1>Welcome back</h1>
                    <p>Log in to your FlowCast account</p>
                </div>

                <form id="login-form" action="/api/login" method="POST">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="forgot-password">
                        <a href="/forgot-password">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>

                <div class="divider">or</div>

                <button class="btn social-btn" onclick="loginWithGoogle()">
                    <span>🌐</span> Continue with Google
                </button>

                <div class="auth-footer">
                    Don't have an account? <a href="/signup">Sign up</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Login successful! Redirecting to dashboard...');
                    window.location.href = '/dashboard';
                } else {
                    alert(data.error || 'Invalid credentials');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });

        function loginWithGoogle() {
            alert('Google OAuth integration coming soon!');
        }
    </script>
</body>
</html>
