<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Central broadcast node -->
  <circle cx="160" cy="256" r="45" fill="white" filter="url(#glow)"/>
  
  <!-- Signal wave 1 (closest) -->
  <path d="M 220 160 Q 320 160 380 256" stroke="white" stroke-width="28" fill="none" opacity="0.95" stroke-linecap="round"/>
  <path d="M 220 352 Q 320 352 380 256" stroke="white" stroke-width="28" fill="none" opacity="0.95" stroke-linecap="round"/>
  
  <!-- Signal wave 2 (middle) -->
  <path d="M 220 110 Q 380 110 440 256" stroke="white" stroke-width="20" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 220 402 Q 380 402 440 256" stroke="white" stroke-width="20" fill="none" opacity="0.7" stroke-linecap="round"/>
  
  <!-- Signal wave 3 (farthest) -->
  <path d="M 220 70 Q 420 70 480 256" stroke="white" stroke-width="14" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M 220 442 Q 420 442 480 256" stroke="white" stroke-width="14" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
